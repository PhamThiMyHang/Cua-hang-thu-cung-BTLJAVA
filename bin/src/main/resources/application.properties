spring.application.name=CuaHangThuCung

# 1. Cấu hình kết nối MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/CuaHangThuCung
spring.datasource.username=root
spring.datasource.password=123456

# 2. Cấu hình Hibernate (JPA)
# 'update' giúp tự động so khớp Class Java với bảng MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect